<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#090e17"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fde047"/>
      <stop offset="50%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="teal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d2c4"/>
      <stop offset="100%" stop-color="#0d9488"/>
    </linearGradient>
  </defs>
  
  <!-- Apple iOS Squircle Icon Background -->
  <rect width="512" height="512" rx="140" fill="url(#bg)"/>
  <rect width="480" height="480" x="16" y="16" rx="124" fill="none" stroke="url(#teal)" stroke-width="14" stroke-opacity="0.75"/>
  
  <!-- Modern Chat / Dictionary Card Motif -->
  <path d="M 120 140 Q 120 100 160 100 L 352 100 Q 392 100 392 140 L 392 300 Q 392 340 352 340 L 220 340 L 140 420 L 160 340 Q 120 340 120 300 Z" fill="rgba(255,255,255,0.06)" stroke="url(#gold)" stroke-width="16" stroke-linejoin="round"/>
  
  <!-- Bold Typography 'BM' (Bahasa Melayu) -->
  <text x="256" y="265" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="155" font-weight="950" fill="url(#gold)" text-anchor="middle" letter-spacing="-2">BM</text>
  
  <!-- Petronas Cyan Sparkle Dot -->
  <circle cx="392" cy="116" r="26" fill="url(#teal)"/>
</svg>